spring:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: false

jwt:
  secret: ${JWT_SECRET}

app:
  cors:
    allowed-origins: http://localhost:3000
  oauth:
    success-redirect-uri: http://localhost:3000/oauth/callback
  cookie:
    same-site: Lax
    refresh-token:
      name: refreshToken
      max-age-days: 14
      secure: false