spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  oauth:
    success-redirect-uris: ${OAUTH_SUCCESS_REDIRECT_URIS}
    default-success-redirect-uri: ${OAUTH_DEFAULT_SUCCESS_REDIRECT_URI}
    failure-redirect-uri: ${OAUTH_FAILURE_REDIRECT_URI}
  cookie:
    same-site: None
    access-token:
      name: accessToken
      max-age-ms: 1800000
      secure: true
    refresh-token:
      name: refreshToken
      max-age-days: 14
      secure: true
    admin-access-token:
      name: adminAccessToken
      max-age-ms: 1800000
      secure: true
    admin-refresh-token:
      name: adminRefreshToken
      max-age-days: 14
      secure: true