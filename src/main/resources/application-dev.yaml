spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  oauth:
    success-redirect-uri: ${OAUTH_SUCCESS_REDIRECT_URI}
  cookie:
    same-site: None
    refresh-token:
      name: refreshToken
      max-age-days: 14
      secure: true
    access-token:
      name: accessToken
      max-age-seconds: 1800
      secure: true