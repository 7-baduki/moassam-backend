name: develop

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io/7-baduki/moassam-backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload JAR
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  docker-build:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_name: ${{ steps.image.outputs.image_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: Resolve image tag
        id: image
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "image_name=${REGISTRY}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "image_name=${REGISTRY}:develop" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.image_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deploy scripts to dev server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "deploy"
          target: "/home/abcd010531/moassam"

      - name: Deploy to dev server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/abcd010531/moassam

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            chmod +x deploy/scripts/*.sh

            cat > deploy/.env << 'ENVEOF'
            IMAGE_NAME=${{ needs.docker-build.outputs.image_name }}
            PREVIOUS_IMAGE_NAME=ghcr.io/7-baduki/moassam-backend:develop-previous
            SPRING_PROFILES_ACTIVE=dev
            NGINX_SERVER_NAME=${{ secrets.NGINX_SERVER_NAME }}
            
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}

            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
            NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
            NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
  
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GCP_BUCKET=${{ secrets.GCP_BUCKET }}
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            OAUTH_SUCCESS_REDIRECT_URIS=${{ secrets.OAUTH_SUCCESS_REDIRECT_URIS }}
            OAUTH_DEFAULT_SUCCESS_REDIRECT_URI=${{ secrets.OAUTH_DEFAULT_SUCCESS_REDIRECT_URI }}
            OAUTH_FAILURE_REDIRECT_URI=${{ secrets.OAUTH_FAILURE_REDIRECT_URI }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ENVEOF

            chmod 600 deploy/.env
            ./deploy/scripts/deploy.sh

  deploy-prod:
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deploy scripts to prod server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "deploy"
          target: "/home/abcd010531/moassam"

      - name: Deploy to prod server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/abcd010531/moassam

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            chmod +x deploy/scripts/*.sh

            cat > deploy/.env << 'ENVEOF'
            IMAGE_NAME=${{ needs.docker-build.outputs.image_name }}
            PREVIOUS_IMAGE_NAME=ghcr.io/7-baduki/moassam-backend:previous
            SPRING_PROFILES_ACTIVE=prod

            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}

            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
            NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
            NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}

            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GCP_BUCKET=${{ secrets.GCP_BUCKET }}
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            OAUTH_SUCCESS_REDIRECT_URIS=${{ secrets.OAUTH_SUCCESS_REDIRECT_URIS }}
            OAUTH_DEFAULT_SUCCESS_REDIRECT_URI=${{ secrets.OAUTH_DEFAULT_SUCCESS_REDIRECT_URI }}
            OAUTH_FAILURE_REDIRECT_URI=${{ secrets.OAUTH_FAILURE_REDIRECT_URI }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ENVEOF

            chmod 600 deploy/.env
            ./deploy/scripts/deploy.sh