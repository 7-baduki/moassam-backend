events {}

http {
    server {
        listen 80;
        server_name 34.50.34.26.nip.io;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name 34.50.34.26.nip.io;

        client_max_body_size 20M;

        ssl_certificate /etc/letsencrypt/live/34.50.34.26.nip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/34.50.34.26.nip.io/privkey.pem;

        location / {
            proxy_pass http://moassam-api:8080;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}