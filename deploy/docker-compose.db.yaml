services:
  moassam-db:
    image: postgres:16
    container_name: moassam-db
    restart: always
    networks:
      - moassam-network
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - postgres-data:/var/lib/postgresql/data

networks:
  moassam-network:
    external: true

volumes:
  postgres-data:
    driver: local