services:
  moassam-nginx:
    image: nginx:latest
    container_name: moassam-nginx
    restart: always
    networks:
      - moassam-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

networks:
  moassam-network:
    external: true