services:
  postgres:
    image: postgres:16
    container_name: moassam-db
    environment:
      POSTGRES_DB: moassam
      POSTGRES_USER: moassam
      POSTGRES_PASSWORD: moassam
      TZ: Asia/Seoul
    ports:
      - "5436:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    labels:
      org.springframework.boot.service-connection: postgres

volumes:
  postgres-data:
